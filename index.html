<!DOCTYPE html>
<html lang="en" class="light">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Music</title>
    <meta name="apple-mobile-web-app-title" content="Music">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' style='stop-color:%230078d4;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%2360a5fa;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='112' fill='url(%23grad)' /%3E%3Cpath d='M210 370V130l210-40v230' fill='none' stroke='%23ffffff' stroke-width='32' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='160' cy='370' r='50' fill='none' stroke='%23ffffff' stroke-width='32'/%3E%3Ccircle cx='370' cy='330' r='50' fill='none' stroke='%23ffffff' stroke-width='32'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: '#0078d4', gray: { 900: '#121212', 950: '#0a0a0a' } } } } }
    </script>
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    
    <style>
        body { touch-action: manipulation; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 0.7); }
        .dark ::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.4); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 0.7); }

        .show { display: block !important; }
        .breadcrumb-item:hover { color: #0078d4; text-decoration: underline; cursor: pointer; }
        .breadcrumb-separator { color: #6b7280; margin: 0 4px; font-weight: 300; }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass { background: rgba(18, 18, 18, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

        .neumorphic { background: #ffffff; box-shadow: 6px 6px 14px rgba(0, 0, 0, 0.05), -6px -6px 14px rgba(255, 255, 255, 0.8); }
        .dark .neumorphic { background: #121212; box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.3), -6px -6px 12px rgba(255, 255, 255, 0.04); }
        .neumorphic:active { box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.05), inset -4px -4px 10px rgba(255, 255, 255, 0.8); }
        .dark .neumorphic:active { box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.3), inset -4px -4px 10px rgba(255, 255, 255, 0.04); }

        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; mask-image: linear-gradient(to right, black 90%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%); }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .marquee-content.short { padding-left: 0; animation: none; display: block; text-overflow: ellipsis; overflow: hidden; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #0078d4; cursor: pointer; margin-top: -4px; box-shadow: 0 0 4px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e5e7eb; border-radius: 2px; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #374151; }

        /* 🔥 대각선 그라데이션 적용 (135deg) */
        .shimmer-active::before { content: ''; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.3); z-index: 40; pointer-events: none; }
        .dark .shimmer-active::before { background: rgba(0, 0, 0, 0.5); }
        .shimmer-active::after { 
            content: ''; position: absolute; top: 0; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.6), transparent); 
            transform: translateX(-100%); 
            animation: shimmerMove 1.2s infinite linear; 
            z-index: 50; pointer-events: none; 
        }
        .dark .shimmer-active::after { background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.15), transparent); }
        @keyframes shimmerMove { 100% { transform: translateX(100%); } }

        .playing-eq { display: flex; align-items: flex-end; justify-content: center; gap: 3px; width: 16px; height: 14px; }
        .eq-bar { width: 3px; background-color: #0078d4; border-radius: 2px; transform-origin: bottom; }
        .dark .eq-bar { background-color: #60a5fa; }
        .eq-bar-1 { height: 100%; animation: eq-bounce 0.7s infinite alternate ease-in-out; }
        .eq-bar-2 { height: 100%; animation: eq-bounce 0.7s infinite alternate ease-in-out -0.3s; }
        .eq-bar-3 { height: 100%; animation: eq-bounce 0.7s infinite alternate ease-in-out -0.5s; }
        @keyframes eq-bounce { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }
        .eq-paused .eq-bar { animation: none; transform: scaleY(0.25); background-color: #9ca3af; }
        .dark .eq-paused .eq-bar { background-color: #6b7280; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-black dark:text-gray-100 font-sans antialiased h-screen overflow-hidden flex flex-col transition-colors duration-300">

    <header class="z-50 glass shrink-0 transition-colors duration-300">
        <div class="flex items-center justify-between px-4 sm:px-6 py-3 sm:py-4 max-w-[1400px] mx-auto">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const msalConfig = { auth: { clientId: "8a7108a1-d00c-4f7c-bbed-f4a4df25b81a", authority: "https://login.microsoftonline.com/common", redirectUri: "https://cloudstreaming.vercel.app/" }, cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false } };
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        
        let accountId = "", currentFolderAudios = [], playingQueue = [], currentIndex = -1, playingFolderId = '';
        let currentObjectUrl = null, playMode = 0, currentFolderId = 'root';
        let pathHistory = [{ id: 'root', name: 'My Drive' }];

        let wakeLock = null;

        msalInstance.handleRedirectPromise().then(handleResponse).catch(console.error);

        function handleResponse(response) {
            if (response || msalInstance.getAllAccounts().length > 0) {
                accountId = response ? response.account.homeAccountId : msalInstance.getAllAccounts()[0].homeAccountId;
                document.getElementById('login_button').style.display = 'none';
                document.getElementById('logout_button').style.display = 'inline-block';
                document.getElementById('action_buttons').style.display = 'flex';
                fetchMyFolders('root', 'My Drive', true); 
                renderRecentUI(); // 로그인 직후 한 번 그려주기
            }
        }

        function signIn() { msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All"] }); }
        function signOut() { msalInstance.logoutRedirect({ account: msalInstance.getAccountByHomeId(accountId) }); }
        
        async function getToken() {
            try { return (await msalInstance.acquireTokenSilent({ scopes: ["Files.ReadWrite.All"], account: msalInstance.getAccountByHomeId(accountId) })).accessToken; }
            catch (error) { msalInstance.acquireTokenRedirect({ scopes: ["Files.ReadWrite.All"] }); return null; }
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    const indicator = document.getElementById('wake_lock_indicator');
                    indicator.classList.remove('opacity-0', 'scale-95');
                    indicator.classList.add('opacity-100', 'scale-100');
                    
                    wakeLock.addEventListener('release', () => { 
                        indicator.classList.remove('opacity-100', 'scale-100');
                        indicator.classList.add('opacity-0', 'scale-95');
                    });
                }
            } catch (err) { console.error(`Wake Lock error: ${err.name}`); }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && !audio.paused) { requestWakeLock(); }
        });

        function updateMarqueeText(text) {
            const fileInfoEl = document.getElementById('file_info');
            const containerEl = fileInfoEl.parentElement;
            fileInfoEl.innerText = text;
            setTimeout(() => {
                if (fileInfoEl.scrollWidth > containerEl.clientWidth) {
                    fileInfoEl.classList.remove('short');
                    fileInfoEl.style.animationDuration = `${fileInfoEl.scrollWidth / 25}s`;
                } else {
                    fileInfoEl.classList.add('short');
                    fileInfoEl.style.animationDuration = '';
                }
            }, 50);
        }

        function setStatus(text, type) {
            const el = document.getElementById('status_info'), dot = document.getElementById('status_dot');
            el.innerText = text;
            el.className = `text-[10px] sm:text-xs font-semibold tracking-[0.2em] uppercase ${type === 'play' ? 'text-green-500' : type === 'load' ? 'text-[#0078d4] dark:text-blue-400' : type === 'err' ? 'text-red-500' : 'text-gray-500 dark:text-gray-400'}`;
            dot.className = `w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full ${type === 'play' ? 'bg-green-500' : type === 'load' ? 'bg-[#0078d4] dark:bg-blue-400 animate-pulse' : type === 'err' ? 'bg-red-500' : 'bg-gray-300 dark:bg-gray-600'}`;
        }

        function toggleMenu(e, id) {
            e.stopPropagation();
            e.preventDefault();
            const target = document.getElementById(id);
            const isShowing = target.classList.contains('show');
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            if (!isShowing) target.classList.add('show');
        }
        function closeAllDropdowns(e) {
            if (!e.target.closest('.menu-btn') && !e.target.closest('.dropdown-content')) {
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            }
        }
        document.addEventListener('click', closeAllDropdowns);
        document.addEventListener('touchstart', closeAllDropdowns, { passive: true });

        // 🔥 최근 재생 기록 뇌(로컬스토리지) 설계 - 3개까지만
        function getRecentTracks() {
            try { return JSON.parse(localStorage.getItem('recent_tracks') || '[]'); } 
            catch (e) { return []; }
        }

        function saveRecentTrack(track) {
            if (!track || !track.name) return;
            let recent = getRecentTracks();
            recent = recent.filter(t => t.id !== track.id); // 기존에 있으면 지우고
            
            // 폴더 정보도 같이 저장
            const folderName = pathHistory[pathHistory.length - 1]?.name || 'My Drive';
            recent.unshift({ id: track.id, name: track.name, folderId: currentFolderId, folderName: folderName }); 
            
            if (recent.length > 3) recent = recent.slice(0, 3); // 3개까지만 유지
            try { localStorage.setItem('recent_tracks', JSON.stringify(recent)); } catch(e){}
            renderRecentUI();
        }

        function renderRecentUI() {
            const container = document.getElementById('recent_tracks_container');
            const list = document.getElementById('recent_tracks_list');
            const recent = getRecentTracks();
            
            if (recent.length === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            list.innerHTML = '';
            
            recent.forEach(track => {
                const chip = document.createElement('div');
                chip.className = 'w-full px-3 py-2 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-900/50 text-[11px] sm:text-xs font-medium text-center text-gray-600 dark:text-gray-400 cursor-pointer active:scale-95 transition-all md:hover:border-[#0078d4] md:hover:text-[#0078d4] truncate';
                chip.innerText = track.name.replace(/\.[^/.]+$/, ""); 
                
                // 클릭 시 딜레이 없이 노래부터 틀고, 뒤이어 폴더 이동
                chip.onclick = () => {
                    playingQueue = [track];
                    currentIndex = 0;
                    playTrack(0);
                    
                    if (currentFolderId !== track.folderId) {
                        fetchMyFolders(track.folderId, track.folderName, true);
                    }
                };
                list.appendChild(chip);
            });
        }

        async function createFolder() {
            const name = prompt("Enter new folder name:");
            if (name) {
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${currentFolderId}/children`, { method: 'POST', headers: { 'Authorization': `Bearer ${await getToken()}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name, folder: { }, "@microsoft.graph.conflictBehavior": "rename" }) })
                .then(res => { if (res.ok) fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false); });
            }
        }
        async function renameItem(id, old, isFolder=false) {
            const name = prompt(`Enter new ${isFolder ? 'folder' : 'file'} name:`, old);
            if (name && name !== old) {
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${await getToken()}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) })
                .then(res => { 
                    if (res.ok) {
                        fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false);
                        if (!isFolder && playingQueue[currentIndex] && playingQueue[currentIndex].id === id) updateMarqueeText(name);
                    } 
                });
            }
        }
        async function deleteItem(id, name, isFolder=false) {
            if (confirm(isFolder ? `Delete folder '${name}' and all contents?` : `Delete track '${name}'?`)) {
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${await getToken()}` } })
                .then(res => { 
                    if (res.ok || res.status===204) {
                        if (!isFolder && playingQueue[currentIndex] && playingQueue[currentIndex].id === id) { audio.pause(); setStatus('STANDBY', 'standby'); updateMarqueeText('Select a track'); iconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); }
                        fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false);
                    } 
                });
            }
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            const container = document.getElementById('file_list_container');
            container.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-sm text-[#0078d4] font-medium"><svg class="animate-spin w-8 h-8 mb-3" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Uploading...</div>';
            try {
                const token = await getToken();
                for (let file of files) {
                    const session = await (await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${currentFolderId}:/${encodeURIComponent(file.name)}:/createUploadSession`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } })).json();
                    await fetch(session.uploadUrl, { method: 'PUT', headers: { 'Content-Length': `${file.size}`, 'Content-Range': `bytes 0-${file.size - 1}/${file.size}` }, body: file });
                }
            } catch (err) { alert(`Upload failed.`); }
            event.target.value = ''; fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false);
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumb_container'); container.innerHTML = '';
            pathHistory.forEach((step, index) => {
                const span = document.createElement('span');
                span.innerText = step.name;
                if (index === pathHistory.length - 1) span.className = 'font-semibold text-gray-900 dark:text-white';
                else { span.className = 'breadcrumb-item transition dark:hover:text-[#0078d4]'; span.onclick = () => { pathHistory = pathHistory.slice(0, index + 1); fetchMyFolders(step.id, step.name, false); }; }
                container.appendChild(span);
                if (index < pathHistory.length - 1) { const sep = document.createElement('span'); sep.className = 'breadcrumb-separator'; sep.innerText = '/'; container.appendChild(sep); }
            });
        }

        async function fetchMyFolders(folderId, folderName, isNewNavigation = true) {
            const container = document.getElementById('file_list_container');
            
            // 🔥 감성적인 스켈레톤(Skeleton) 로딩 뼈대
            const skeletonHTML = Array(5).fill(0).map(() => `
                <div class="flex items-center justify-between p-3 sm:p-4 mb-2 rounded-[1.2rem] border border-gray-100 dark:border-gray-800/80 bg-gray-50/50 dark:bg-gray-900/30">
                    <div class="flex items-center gap-3 sm:gap-4 flex-1">
                        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-gray-200 dark:bg-gray-800 animate-pulse"></div>
                        <div class="flex-1 space-y-2 py-1 pr-12">
                            <div class="h-3.5 bg-gray-200 dark:bg-gray-800 rounded w-3/4 animate-pulse"></div>
                            <div class="h-2.5 bg-gray-200 dark:bg-gray-800 rounded w-1/2 animate-pulse"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            container.innerHTML = `<div class="w-full">${skeletonHTML}</div>`;
            
            currentFolderId = folderId; 
            if (isNewNavigation && folderId !== 'root') pathHistory.push({ id: folderId, name: folderName });
            else if (folderId === 'root') pathHistory = [{ id: 'root', name: 'My Drive' }];
            renderBreadcrumbs();

            try {
                const token = await getToken();
                if (!token) return;

                const url = folderId === 'root' 
                    ? "https://graph.microsoft.com/v1.0/me/drive/root/children" 
                    : `https://graph.microsoft.com/v1.0/me/drive/items/${folderId}/children`;

                const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                if (!res.ok) throw new Error("API Error");
                
                const data = await res.json();
                if (!data || !data.value) throw new Error("Data empty");

                container.innerHTML = '';
                
                let folders = data.value.filter(i => i.folder);
                let audios = data.value.filter(i => i.file && i.file.mimeType?.includes('audio'));
                
                folders.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
                audios.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
                
                currentFolderAudios = audios; 
                document.getElementById('shuffle_folder_btn').style.display = audios.length > 0 ? 'flex' : 'none';

                folders.forEach(folder => {
                    const item = document.createElement('div');
                    item.className = 'flex items-center justify-between p-3 sm:p-4 mb-2 border border-gray-100 dark:border-gray-800/80 rounded-[1.2rem] bg-gray-50/50 dark:bg-gray-900/30 active:bg-gray-100 dark:active:bg-gray-800/50 md:hover:bg-blue-50/50 md:dark:hover:bg-blue-900/20 shadow-sm group transition cursor-pointer';
                    item.onclick = () => fetchMyFolders(folder.id, folder.name, true);
                    item.innerHTML = `<div class="flex items-center gap-3 sm:gap-4 flex-1 min-w-0 pr-2"><div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center shrink-0 pointer-events-none"><svg class="w-5 h-5 sm:w-6 sm:h-6 text-[#0078d4] dark:text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div><span class="text-sm sm:text-base font-semibold truncate text-gray-800 dark:text-gray-200 md:group-hover:text-[#0078d4] md:dark:group-hover:text-blue-400 transition pointer-events-none">${folder.name}</span></div>`;
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'relative shrink-0 opacity-100 lg:opacity-0 md:group-hover:opacity-100 focus-within:opacity-100 transition flex items-center';
                    actionsDiv.innerHTML = `<button onclick="toggleMenu(event, 'drop-f-${folder.id}')" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-white rounded-full transition font-bold menu-btn">⋮</button><div id="drop-f-${folder.id}" class="dropdown-content absolute right-0 mt-8 w-28 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-20 hidden"><a onclick="event.stopPropagation(); renameItem('${folder.id}', '${folder.name.replace(/'/g,"\\'")}', true)" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">Rename</a><a onclick="event.stopPropagation(); deleteItem('${folder.id}', '${folder.name.replace(/'/g,"\\'")}', true)" class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer">Delete</a></div>`;
                    item.append(actionsDiv); container.appendChild(item);
                });

                currentFolderAudios.forEach((file, index) => {
                    const item = document.createElement('div'); item.id = `track_row_${file.id}`;
                    item.className = 'flex items-center justify-between p-3 sm:p-3.5 mb-1.5 cursor-pointer rounded-2xl border border-transparent active:bg-gray-100 dark:active:bg-gray-800/50 md:hover:bg-gray-50 md:dark:hover:bg-gray-800/50 transition group';
                    const infoDiv = document.createElement('div'); infoDiv.className = 'flex items-center gap-3 sm:gap-4 flex-1 min-w-0 pr-4';
                    infoDiv.onclick = () => {
                        const currentPlayingId = playingQueue[currentIndex]?.id;
                        if (file.id === currentPlayingId && audio.src) togglePlayPause();
                        else { playingQueue = [...currentFolderAudios]; playingFolderId = currentFolderId; currentIndex = index; playTrack(currentIndex); }
                    };
                    infoDiv.innerHTML = `<div id="track_icon_${file.id}" class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center shrink-0 text-gray-400 dark:text-gray-500 font-medium text-sm bg-gray-100 dark:bg-gray-900 md:group-hover:text-[#0078d4] md:dark:group-hover:text-blue-400 transition">${index + 1}</div><p id="track_text_${file.id}" class="text-sm sm:text-[15px] leading-tight truncate text-gray-800 dark:text-gray-200 font-medium md:group-hover:text-[#0078d4] md:dark:group-hover:text-blue-400 transition">${file.name}</p>`;
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'relative shrink-0 opacity-100 lg:opacity-0 md:group-hover:opacity-100 focus-within:opacity-100 transition flex items-center';
                    actionsDiv.innerHTML = `<button onclick="toggleMenu(event, 'drop-m-${file.id}')" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-white rounded-full transition font-bold menu-btn">⋮</button><div id="drop-m-${file.id}" class="dropdown-content absolute right-0 mt-8 w-28 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-20 hidden"><a onclick="event.stopPropagation(); renameItem('${file.id}', '${file.name.replace(/'/g,"\\'")}')" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">Rename</a><a onclick="event.stopPropagation(); deleteItem('${file.id}', '${file.name.replace(/'/g,"\\'")}')" class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer">Delete</a></div>`;
                    item.append(infoDiv, actionsDiv); container.appendChild(item);
                });
                if (!folders.length && !audios.length) container.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-sm text-gray-400"><div class="text-3xl mb-2 opacity-50">📁</div>Folder is empty.</div>';
                updateActiveTrackUI();
            
            } catch (err) {
                console.error("Fetch Error:", err);
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-sm text-red-500 font-medium"><svg class="w-8 h-8 mb-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg><span class="opacity-80">Connection Error. Please refresh.</span></div>`;
            }
        }

        function updateActiveTrackUI() {
            const currentPlayingId = playingQueue[currentIndex]?.id;
            
            currentFolderAudios.forEach((file, index) => {
                const isActive = (file.id === currentPlayingId && audio.src !== "");
                const row = document.getElementById(`track_row_${file.id}`);
                const icon = document.getElementById(`track_icon_${file.id}`);
                const text = document.getElementById(`track_text_${file.id}`);
                if(!row || !icon || !text) return;
                
                if (isActive) {
                    row.className = `flex items-center justify-between p-3 sm:p-3.5 mb-1.5 cursor-pointer rounded-2xl bg-blue-50/80 dark:bg-blue-900/30 border border-blue-100 dark:border-blue-900/40 shadow-sm transition group`;
                    icon.className = `w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center shrink-0 transition`;
                    
                    if(!audio.paused && audio.src) {
                        icon.innerHTML = `<div class="playing-eq"><span class="eq-bar eq-bar-1"></span><span class="eq-bar eq-bar-2"></span><span class="eq-bar eq-bar-3"></span></div>`;
                    } else {
                        icon.innerHTML = `<div class="playing-eq eq-paused"><span class="eq-bar eq-bar-1"></span><span class="eq-bar eq-bar-2"></span><span class="eq-bar eq-bar-3"></span></div>`;
                    }
                    
                    text.className = `text-sm sm:text-[15px] leading-tight truncate text-[#0078d4] dark:text-blue-300 font-bold transition`;
                } else {
                    row.className = `flex items-center justify-between p-3 sm:p-3.5 mb-1.5 cursor-pointer rounded-2xl border border-transparent active:bg-gray-100 dark:active:bg-gray-800/50 md:hover:bg-gray-50 md:dark:hover:bg-gray-800/50 transition group`;
                    icon.className = `w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center shrink-0 text-gray-400 dark:text-gray-500 font-medium text-sm bg-gray-100 dark:bg-gray-900 md:group-hover:text-[#0078d4] md:dark:group-hover:text-blue-400 transition`;
                    icon.innerHTML = index + 1;
                    text.className = `text-sm sm:text-[15px] leading-tight truncate text-gray-800 dark:text-gray-200 font-medium md:group-hover:text-[#0078d4] md:dark:group-hover:text-blue-400 transition`;
                }
            });
        }

        const audio = document.getElementById('audio_player'), playPauseBtn = document.getElementById('play_pause_btn'), iconPlay = document.getElementById('icon_play'), iconPause = document.getElementById('icon_pause');
        const progressBar = document.getElementById('progress_bar'), currentTimeEl = document.getElementById('current_time'), durationTimeEl = document.getElementById('duration_time');

        function formatTime(sec) { if (isNaN(sec)) return "0:00"; const m = Math.floor(sec / 60), s = Math.floor(sec % 60); return `${m}:${s < 10 ? '0' : ''}${s}`; }

        audio.addEventListener('timeupdate', () => { if (!audio.duration) return; progressBar.value = (audio.currentTime / audio.duration) * 100; currentTimeEl.innerText = formatTime(audio.currentTime); });
        audio.addEventListener('loadedmetadata', () => { durationTimeEl.innerText = formatTime(audio.duration); progressBar.disabled = false; });
        progressBar.addEventListener('input', (e) => audio.currentTime = (e.target.value / 100) * audio.duration);

        function togglePlayPause() {
            if(playingQueue.length === 0) return;
            if (audio.paused) { if(!audio.src) playTrack(currentIndex); else audio.play(); } 
            else audio.pause();
        }

        audio.addEventListener('play', () => { 
            iconPlay.classList.add('hidden'); iconPause.classList.remove('hidden'); 
            setStatus('NOW PLAYING', 'play'); 
            updateActiveTrackUI(); 
            requestWakeLock();
        });
        audio.addEventListener('pause', () => { 
            iconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); 
            const currentStatus = document.getElementById('status_info').innerText;
            if(currentStatus !== 'BUFFERING...' && currentStatus !== 'ERROR') setStatus('PAUSED', 'standby'); 
            updateActiveTrackUI(); 
            releaseWakeLock();
        });

        function toggleRepeat() {
            playMode = (playMode + 1) % 4;
            updateRepeatBtnUI();
        }
        
        function updateRepeatBtnUI() {
            const btn = document.getElementById('repeat_btn');
            let svgContent = '';
            
            if (playMode === 0 || playMode === 1) {
                svgContent = `<svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
            } else if (playMode === 2) {
                svgContent = `<svg class="w-5 h-5 sm:w-6 sm:h-6 relative" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path><text x="12" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="currentColor" text-anchor="middle" stroke="none">1</text></svg>`;
            } else if (playMode === 3) {
                svgContent = `<svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/></svg>`;
            }

            btn.innerHTML = svgContent;
            if(playMode > 0) { 
                btn.className = `absolute left-0 flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-full transition md:hover:text-[#0078d4] md:dark:hover:text-blue-400 text-[#0078d4] dark:text-blue-400 active:scale-95`;
            } else { 
                btn.className = `absolute left-0 flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-full transition md:hover:text-[#0078d4] md:dark:hover:text-blue-400 text-gray-400 active:scale-95`;
            }
        }

        function playRandomFromFolder() {
            if(currentFolderAudios.length === 0) return;
            playMode = 3; 
            updateRepeatBtnUI();
            playingQueue = [...currentFolderAudios];
            playingFolderId = currentFolderId;
            currentIndex = Math.floor(Math.random() * playingQueue.length);
            playTrack(currentIndex);
        }

        async function playTrack(index, autoPlay = true) {
            if (index < 0 || index >= playingQueue.length) return;
            audio.pause(); audio.removeAttribute('src'); 
            
            currentIndex = index; 
            updateActiveTrackUI(); 
            updateMarqueeText(playingQueue[index].name);
            
            // 🔥 곡 재생 시점에 기록
            saveRecentTrack(playingQueue[index]);
            
            setStatus('BUFFERING...', 'load'); progressBar.value = 0; currentTimeEl.innerText = "0:00"; progressBar.disabled = true;

            const playerCard = document.getElementById('player_card'); playerCard.classList.add('shimmer-active');

            try {
                const token = await getToken();
                const contentRes = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${playingQueue[index].id}/content`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                if (!contentRes.ok) throw new Error("File Download Failed");

                const blob = await contentRes.blob();
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = URL.createObjectURL(blob);
                audio.src = currentObjectUrl;

                playerCard.classList.remove('shimmer-active');

                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: playingQueue[index].name.replace(/\.[^/.]+$/, ""), 
                        artist: 'OneDrive Streaming',
                        album: 'Music Player',
                        artwork: [ { src: 'data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Cdefs%3E%3ClinearGradient id=%22grad%22 x1=%220%25%22 y1=%22100%25%22 x2=%22100%25%22 y2=%220%25%22%3E%3Cstop offset=%220%25%22 style=%22stop-color:%230078d4;stop-opacity:1%22 /%3E%3Cstop offset=%22100%25%22 style=%22stop-color:%2360a5fa;stop-opacity:1%22 /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width=%22512%22 height=%22512%22 rx=%22112%22 fill=%22url(%23grad)%22 /%3E%3Cpath d=%22M210 370V130l210-40v230%22 fill=%22none%22 stroke=%22%23ffffff%22 stroke-width=%2232%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/%3E%3Ccircle cx=%22160%22 cy=%22370%22 r=%2250%22 fill=%22none%22 stroke=%22%23ffffff%22 stroke-width=%2232%22/%3E%3Ccircle cx=%22370%22 cy=%22330%22 r=%2250%22 fill=%22none%22 stroke=%22%23ffffff%22 stroke-width=%2232%22/%3E%3C/svg%3E', sizes: '512x512', type: 'image/svg+xml' } ]
                    });
                    navigator.mediaSession.setActionHandler('play', () => { togglePlayPause(); });
                    navigator.mediaSession.setActionHandler('pause', () => { togglePlayPause(); });
                    navigator.mediaSession.setActionHandler('previoustrack', () => { playPrevTrack(); });
                    navigator.mediaSession.setActionHandler('nexttrack', () => { playNextTrack(true); });
                }

                if(autoPlay) audio.play(); else setStatus('READY', 'standby');

            } catch(err) {
                console.error(err);
                playerCard.classList.remove('shimmer-active'); 
                setStatus('ERROR', 'err');
            }
        }

        function playNextTrack(isManual = false) {
            if (playingQueue.length === 0) return;
            if (playMode === 2 && !isManual) playTrack(currentIndex);
            else if (playMode === 3) {
                let next = currentIndex; 
                if (playingQueue.length > 1) {
                    while (next === currentIndex) next = Math.floor(Math.random() * playingQueue.length);
                }
                playTrack(next);
            } else if (currentIndex + 1 < playingQueue.length) playTrack(currentIndex + 1);
            else if (playMode === 1) playTrack(0);
            else { setStatus('FINISHED', 'standby'); iconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); updateActiveTrackUI(); }
        }
        
        function playPrevTrack() { 
            if (playingQueue.length === 0) return;
            if (audio.currentTime > 3) audio.currentTime = 0; 
            else if (currentIndex > 0) playTrack(currentIndex - 1); 
        }
        
        audio.addEventListener('ended', () => playNextTrack(false));

    </script>
</body>
