<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Microsoft_OneDrive_icon.svg/512px-Microsoft_OneDrive_icon.svg.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        brand: '#0078d4',
                        gray: { 900: '#121212', 950: '#0a0a0a' }
                    }
                }
            }
        }
    </script>
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .show { display: block !important; }
        .breadcrumb-item:hover { color: #0078d4; text-decoration: underline; cursor: pointer; }
        .breadcrumb-separator { color: #6b7280; margin: 0 4px; font-weight: 300; }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass { background: rgba(18, 18, 18, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; mask-image: linear-gradient(to right, black 90%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%); }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .marquee-content.short { padding-left: 0; animation: none; display: block; text-overflow: ellipsis; overflow: hidden; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #0078d4; cursor: pointer; margin-top: -4px; box-shadow: 0 0 4px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e5e7eb; border-radius: 2px; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #374151; }

        /* 🔥 수정된 Shimmer 이펙트 (속도 느리게 조절: 3초) */
        .shimmer-active::before { content: ''; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.3); z-index: 40; pointer-events: none; }
        .dark .shimmer-active::before { background: rgba(0, 0, 0, 0.5); }
        .shimmer-active::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 200%; left: -100%;
            background: linear-gradient(90deg, transparent 25%, rgba(255, 255, 255, 0.6) 50%, transparent 75%);
            animation: shimmerMove 3s infinite linear;
            z-index: 50; pointer-events: none;
        }
        .dark .shimmer-active::after { background: linear-gradient(90deg, transparent 25%, rgba(255, 255, 255, 0.1) 50%, transparent 75%); }
        @keyframes shimmerMove { 0% { transform: translateX(0%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<!-- 🔥 스크롤 방지를 위해 overflow-hidden을 바디에 강제 적용 -->
<body class="bg-gray-50 text-gray-900 dark:bg-black dark:text-gray-100 font-sans antialiased h-screen overflow-hidden flex flex-col transition-colors duration-300">

    <header class="z-50 glass shrink-0 transition-colors duration-300">
        <div class="flex items-center justify-between px-4 sm:px-6 py-3 sm:py-4 max-w-[1400px] mx-auto">
            <div onclick="window.location.reload()" class="font-bold text-lg sm:text-xl tracking-tight flex items-center gap-2.5 text-gray-900 dark:text-white cursor-pointer hover:opacity-70 transition">
                <div class="w-7 h-7 sm:w-8 sm:h-8 bg-gradient-to-tr from-[#0078d4] to-blue-400 rounded-xl flex items-center justify-center shadow-md">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
                </div>
                Music
            </div>
            
            <div class="flex items-center gap-3 sm:gap-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400 transition" title="Toggle Theme">
                    <svg id="theme_icon_light" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="theme_icon_dark" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <button id="login_button" onclick="signIn()" class="bg-[#0078d4] text-white px-4 py-1.5 sm:px-5 sm:py-2 rounded-full text-sm font-semibold hover:opacity-90 transition shadow-md">
                    Sign In
                </button>
                <button id="logout_button" style="display: none;" onclick="signOut()" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white px-2 py-1.5 text-sm font-medium transition">
                    Sign Out
                </button>
            </div>
        </div>
    </header>

    <!-- 🔥 한 화면에 꽉 차는 컴팩트 레이아웃 (페이지 스크롤 없음) -->
    <main class="flex-1 max-w-[1400px] w-full mx-auto px-4 sm:px-6 py-4 sm:py-6 flex flex-col lg:flex-row gap-4 sm:gap-8 overflow-hidden">
        
        <!-- 왼쪽 영역: 감성 플레이어 -->
        <div class="w-full lg:w-[45%] flex flex-col shrink-0">
            <div id="player_card" class="h-auto lg:h-full border border-gray-100 dark:border-gray-800 rounded-[2rem] p-5 sm:p-10 bg-white dark:bg-gray-900 shadow-xl shadow-gray-200/50 dark:shadow-none flex flex-col justify-center gap-6 sm:gap-10 relative overflow-hidden transition-colors duration-300">
                <div class="absolute -top-32 -right-32 w-64 h-64 bg-blue-400/20 dark:bg-blue-900/20 rounded-full blur-[80px] pointer-events-none"></div>

                <!-- 모바일에서는 가로로 콤팩트하게, 앨범커버 소형화 -->
                <div class="flex flex-row items-center sm:flex-col sm:items-start gap-4 sm:gap-8 z-10 w-full text-left">
                    <div class="w-16 h-16 sm:w-48 sm:h-48 sm:mx-auto lg:mx-0 bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-800 dark:to-gray-950 rounded-2xl sm:rounded-[2rem] flex items-center justify-center shrink-0 shadow-inner relative overflow-hidden border border-white/50 dark:border-gray-700/50">
                        <svg class="w-8 h-8 sm:w-16 sm:h-16 text-gray-400 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                    </div>
                    
                    <div class="flex-1 min-w-0 w-full sm:pt-2">
                        <div class="flex items-center gap-2 mb-1 sm:mb-3 sm:justify-center lg:justify-start">
                            <span class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full bg-gray-300 dark:bg-gray-600" id="status_dot"></span>
                            <span class="text-[10px] sm:text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-[0.2em] uppercase" id="status_info">STANDBY</span>
                        </div>
                        
                        <div class="marquee-container text-lg sm:text-4xl font-bold text-gray-900 dark:text-white mb-1 sm:mb-2 sm:text-center lg:text-left">
                            <div id="file_info" class="marquee-content short">Select a track</div>
                        </div>
                        <p class="text-xs sm:text-base font-medium text-gray-400 dark:text-gray-500 sm:text-center lg:text-left">OneDrive Streaming</p>
                    </div>
                </div>

                <div class="z-10 w-full flex flex-col gap-4 sm:gap-6 mt-2 sm:mt-0">
                    <audio id="audio_player" class="hidden"></audio>
                    
                    <div class="flex items-center gap-3 sm:gap-4 w-full text-xs sm:text-sm font-medium text-gray-400">
                        <span id="current_time">0:00</span>
                        <input type="range" id="progress_bar" value="0" step="0.1" min="0" max="100" class="flex-1" disabled>
                        <span id="duration_time">0:00</span>
                    </div>

                    <div class="flex items-center justify-center sm:justify-between w-full mt-1 sm:mt-2">
                        <button id="repeat_btn" onclick="toggleRepeat()" class="hidden sm:flex items-center justify-center w-12 h-12 rounded-full text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>

                        <div class="flex items-center gap-6 sm:gap-8">
                            <button onclick="playPrevTrack()" class="p-2 text-gray-800 dark:text-white hover:opacity-70 transition">
                                <svg class="w-8 h-8 sm:w-10 sm:h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"/></svg>
                            </button>
                            
                            <!-- 🔥 일관성 있는 감성 재생버튼 (두꺼운 검은 원 탈피) -->
                            <button id="play_pause_btn" onclick="togglePlayPause()" class="w-14 h-14 sm:w-20 sm:h-20 bg-gradient-to-tr from-[#0078d4] to-blue-500 text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition shadow-lg shadow-blue-500/30">
                                <svg id="icon_play" class="w-7 h-7 sm:w-10 sm:h-10 ml-1.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                                <svg id="icon_pause" class="w-7 h-7 sm:w-10 sm:h-10 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                            </button>

                            <button onclick="playNextTrack(true)" class="p-2 text-gray-800 dark:text-white hover:opacity-70 transition">
                                <svg class="w-8 h-8 sm:w-10 sm:h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M11.555 14.832A1 1 0 0010 14v-2.798l-5.445 3.63A1 1 0 003 14V6a1 1 0 001.555-.832L10 8.798V6a1 1 0 001.555-.832l6 4a1 1 0 000 1.664l-6 4z"/></svg>
                            </button>
                        </div>
                        
                        <button id="repeat_btn_mobile" onclick="toggleRepeat()" class="sm:hidden flex items-center justify-center w-10 h-10 rounded-full text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                        
                        <div class="hidden sm:flex items-center justify-center w-12 h-12 text-gray-400 cursor-not-allowed" title="Volume">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 🔥 우측 영역: 내부에서만 스크롤되는 파일 탐색기 -->
        <div class="w-full lg:w-[55%] flex flex-col flex-1 min-h-0">
            <div class="border border-gray-100 dark:border-gray-800 rounded-[2rem] bg-white dark:bg-gray-950 shadow-sm overflow-hidden flex flex-col h-full transition-colors duration-300">
                
                <!-- 상단 탐색 바 -->
                <div class="bg-gray-50/80 dark:bg-gray-900/80 border-b border-gray-100 dark:border-gray-800 px-5 sm:px-6 py-4 flex items-center justify-between shrink-0">
                    <div class="flex items-center flex-wrap text-sm sm:text-base font-medium text-gray-500 dark:text-gray-400" id="breadcrumb_container">
                        <span class="breadcrumb-item font-semibold text-gray-900 dark:text-white" onclick="fetchMyFolders('root', 'My Drive')">My Drive</span>
                    </div>
                    
                    <!-- 🔥 하나의 메뉴 안에 숨긴 액션 버튼들 -->
                    <div class="flex items-center gap-2 relative" id="action_buttons" style="display: none;">
                        <button onclick="document.querySelectorAll('.dropdown-content').forEach(d=>d.classList.remove('show')); document.getElementById('main_action_drop').classList.toggle('show'); event.stopPropagation();" class="p-2 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition bg-gray-100 dark:bg-gray-800/50 menu-btn">
                            <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        </button>
                        <!-- 숨겨진 드롭다운 메뉴 -->
                        <div id="main_action_drop" class="dropdown-content absolute right-0 top-10 w-44 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 py-1.5 z-50 hidden">
                            <a onclick="createFolder(); document.getElementById('main_action_drop').classList.remove('show');" class="flex items-center gap-2.5 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
                                Create Folder
                            </a>
                            <a onclick="document.getElementById('file_upload').click(); document.getElementById('main_action_drop').classList.remove('show');" class="flex items-center gap-2.5 px-4 py-2 text-sm font-bold text-[#0078d4] dark:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                Upload Music
                            </a>
                        </div>
                        <input type="file" id="file_upload" accept="audio/*" multiple class="hidden" onchange="handleFileUpload(event)">
                    </div>
                </div>

                <!-- 내부 스크롤 목록 영역 -->
                <div id="file_list_container" class="overflow-y-auto no-scrollbar flex-1 p-3 sm:p-5">
                    <div class="text-center text-sm text-gray-400 dark:text-gray-600 font-medium h-full flex flex-col justify-center items-center gap-4">
                        <div class="w-16 h-16 bg-gray-50 dark:bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-100 dark:border-gray-800">
                            <svg class="w-8 h-8 text-gray-300 dark:text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        </div>
                        Please sign in to access your music.
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const msalConfig = { auth: { clientId: "8a7108a1-d00c-4f7c-bbed-f4a4df25b81a", authority: "https://login.microsoftonline.com/common", redirectUri: "https://cloudstreaming.vercel.app/" }, cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false } };
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        
        let accountId = "", playlist = [], currentIndex = -1, currentObjectUrl = null, playMode = 0, currentFolderId = 'root';
        let pathHistory = [{ id: 'root', name: 'My Drive' }];

        msalInstance.handleRedirectPromise().then(handleResponse).catch(console.error);

        function handleResponse(response) {
            if (response || msalInstance.getAllAccounts().length > 0) {
                accountId = response ? response.account.homeAccountId : msalInstance.getAllAccounts()[0].homeAccountId;
                document.getElementById('login_button').style.display = 'none';
                document.getElementById('logout_button').style.display = 'inline-block';
                document.getElementById('action_buttons').style.display = 'flex';
                fetchMyFolders('root', 'My Drive', true); 
            }
        }

        function signIn() { msalInstance.loginRedirect({ scopes: ["Files.ReadWrite.All"] }); }
        function signOut() { msalInstance.logoutRedirect({ account: msalInstance.getAccountByHomeId(accountId) }); }
        async function getToken() {
            try { return (await msalInstance.acquireTokenSilent({ scopes: ["Files.ReadWrite.All"], account: msalInstance.getAccountByHomeId(accountId) })).accessToken; }
            catch (error) { msalInstance.acquireTokenRedirect({ scopes: ["Files.ReadWrite.All"] }); }
        }

        function updateMarqueeText(text) {
            const fileInfoEl = document.getElementById('file_info');
            const containerEl = fileInfoEl.parentElement;
            fileInfoEl.innerText = text;
            setTimeout(() => {
                if (fileInfoEl.scrollWidth > containerEl.clientWidth) {
                    fileInfoEl.classList.remove('short');
                    fileInfoEl.style.animationDuration = `${fileInfoEl.scrollWidth / 25}s`;
                } else {
                    fileInfoEl.classList.add('short');
                    fileInfoEl.style.animationDuration = '';
                }
            }, 50);
        }

        function setStatus(text, type) {
            const el = document.getElementById('status_info');
            const dot = document.getElementById('status_dot');
            el.innerText = text;
            el.className = `text-[10px] sm:text-xs font-semibold tracking-[0.2em] uppercase ${type === 'play' ? 'text-green-500' : type === 'load' ? 'text-[#0078d4] dark:text-blue-400' : type === 'err' ? 'text-red-500' : 'text-gray-500 dark:text-gray-400'}`;
            dot.className = `w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full ${type === 'play' ? 'bg-green-500' : type === 'load' ? 'bg-[#0078d4] dark:bg-blue-400 animate-pulse' : type === 'err' ? 'bg-red-500' : 'bg-gray-300 dark:bg-gray-600'}`;
        }

        // Folder & File Actions
        async function createFolder() {
            const name = prompt("Enter new folder name:");
            if (name) {
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${currentFolderId}/children`, { method: 'POST', headers: { 'Authorization': `Bearer ${await getToken()}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name, folder: { }, "@microsoft.graph.conflictBehavior": "rename" }) })
                .then(res => { if (res.ok) fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false); });
            }
        }
        async function renameItem(id, old, isFolder=false) {
            const name = prompt(`Enter new ${isFolder ? 'folder' : 'file'} name:`, old);
            if (name && name !== old) {
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${await getToken()}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) })
                .then(res => { 
                    if (res.ok) {
                        fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false);
                        if (!isFolder && playlist[currentIndex] && playlist[currentIndex].id === id) updateMarqueeText(name);
                    } 
                });
            }
        }
        async function deleteItem(id, name, isFolder=false) {
            const msg = isFolder ? `WARNING: Permanently delete folder '${name}' and all contents?` : `Delete track '${name}'?`;
            if (confirm(msg)) {
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${await getToken()}` } })
                .then(res => { 
                    if (res.ok || res.status===204) {
                        if (!isFolder && playlist[currentIndex] && playlist[currentIndex].id === id) { audio.pause(); setStatus('STANDBY', 'standby'); updateMarqueeText('Select a track'); iconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); }
                        fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false);
                    } 
                });
            }
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            const container = document.getElementById('file_list_container');
            container.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-sm text-blue-500 font-medium"><svg class="animate-spin w-8 h-8 mb-3" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Uploading...</div>';
            try {
                const token = await getToken();
                for (let file of files) {
                    const session = await (await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${currentFolderId}:/${encodeURIComponent(file.name)}:/createUploadSession`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } })).json();
                    await fetch(session.uploadUrl, { method: 'PUT', headers: { 'Content-Length': `${file.size}`, 'Content-Range': `bytes 0-${file.size - 1}/${file.size}` }, body: file });
                }
            } catch (err) { alert(`Upload failed.`); }
            event.target.value = ''; fetchMyFolders(currentFolderId, pathHistory[pathHistory.length - 1].name, false);
        }

        // Navigation
        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumb_container'); container.innerHTML = '';
            pathHistory.forEach((step, index) => {
                const span = document.createElement('span');
                span.innerText = step.name;
                if (index === pathHistory.length - 1) span.className = 'font-semibold text-gray-900 dark:text-white';
                else { span.className = 'breadcrumb-item transition dark:hover:text-blue-400'; span.onclick = () => { pathHistory = pathHistory.slice(0, index + 1); fetchMyFolders(step.id, step.name, false); }; }
                container.appendChild(span);
                if (index < pathHistory.length - 1) { const sep = document.createElement('span'); sep.className = 'breadcrumb-separator'; sep.innerText = '/'; container.appendChild(sep); }
            });
        }

        // 닫기 헬퍼 (배경 클릭 시 드롭다운 닫기)
        window.onclick = function(e) { if (!e.target.matches('.menu-btn')) { document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); } }

        // Fetch Folders & Render List
        async function fetchMyFolders(folderId, folderName, isNewNavigation = true) {
            const container = document.getElementById('file_list_container');
            container.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-sm text-gray-400"><svg class="animate-spin w-8 h-8 text-gray-300 dark:text-gray-700 mb-3" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Loading...</div>';
            currentFolderId = folderId; 
            if (isNewNavigation && folderId !== 'root') pathHistory.push({ id: folderId, name: folderName });
            else if (folderId === 'root') pathHistory = [{ id: 'root', name: 'My Drive' }];
            renderBreadcrumbs();

            fetch(folderId === 'root' ? "https://graph.microsoft.com/v1.0/me/drive/root/children?$select=id,name,folder,file" : `https://graph.microsoft.com/v1.0/me/drive/items/${folderId}/children?$select=id,name,folder,file`, { headers: { Authorization: `Bearer ${await getToken()}` } })
            .then(res => res.json()).then(data => {
                container.innerHTML = '';
                const folders = data.value.filter(i => i.folder);
                const audios = data.value.filter(i => i.file && i.file.mimeType?.includes('audio'));
                
                playlist = audios; 

                // 🔥 모바일 더블탭 이슈 해결: opacity-100 lg:opacity-0 적용
                folders.forEach(folder => {
                    const item = document.createElement('div');
                    item.className = 'flex items-center justify-between p-3 sm:p-4 mb-2 border border-gray-100 dark:border-gray-800/80 rounded-[1.2rem] bg-gray-50/50 dark:bg-gray-900/30 hover:bg-blue-50/50 dark:hover:bg-blue-900/20 shadow-sm group transition';
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'flex items-center gap-3 sm:gap-4 flex-1 min-w-0 pr-2 cursor-pointer';
                    infoDiv.innerHTML = `
                        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center shrink-0">
                            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-[#0078d4] dark:text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                        </div>
                        <span class="text-sm sm:text-base font-semibold truncate text-gray-800 dark:text-gray-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition">${folder.name}</span>
                    `;
                    infoDiv.onclick = () => fetchMyFolders(folder.id, folder.name, true);

                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'relative shrink-0 opacity-100 lg:opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition flex items-center';
                    actionsDiv.innerHTML = `
                        <button onclick="event.stopPropagation(); document.querySelectorAll('.dropdown-content').forEach(d=>d.classList.remove('show')); document.getElementById('drop-f-${folder.id}').classList.toggle('show');" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-white rounded-full menu-btn transition font-bold">⋮</button>
                        <div id="drop-f-${folder.id}" class="dropdown-content absolute right-0 mt-8 w-28 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-20 hidden">
                            <a onclick="renameItem('${folder.id}', '${folder.name.replace(/'/g,"\\'")}', true)" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">Rename</a>
                            <a onclick="deleteItem('${folder.id}', '${folder.name.replace(/'/g,"\\'")}', true)" class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer">Delete</a>
                        </div>
                    `;
                    item.append(infoDiv, actionsDiv); container.appendChild(item);
                });

                audios.forEach((file, index) => {
                    const isActive = index === currentIndex && audio.src;
                    const item = document.createElement('div');
                    item.id = `track_row_${index}`;
                    item.className = `flex items-center justify-between p-3 sm:p-3.5 mb-1.5 group/item hover:bg-gray-50 dark:hover:bg-gray-800/50 transition cursor-pointer rounded-2xl ${isActive ? 'bg-blue-50/80 dark:bg-blue-900/30 border border-blue-100 dark:border-blue-900/40 shadow-sm' : 'border border-transparent'}`;
                    
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'flex items-center gap-3 sm:gap-4 flex-1 min-w-0 pr-4';
                    infoDiv.onclick = () => playTrack(index);
                    
                    const numSpan = document.createElement('div');
                    numSpan.id = `track_icon_${index}`;
                    numSpan.className = `w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center shrink-0 ${isActive ? 'bg-white dark:bg-gray-800 text-[#0078d4] dark:text-blue-400 shadow-sm' : 'text-gray-400 dark:text-gray-500 font-medium text-sm group-hover/item:text-gray-600 dark:group-hover/item:text-gray-300 bg-gray-100 dark:bg-gray-900 transition'}`;
                    if (isActive) numSpan.innerHTML = `<svg class="w-5 h-5 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>`;
                    else numSpan.innerText = index + 1;
                    
                    const textP = document.createElement('p'); 
                    textP.id = `track_text_${index}`;
                    textP.className = `text-sm sm:text-[15px] leading-tight truncate ${isActive ? 'text-[#0078d4] dark:text-blue-300 font-bold' : 'text-gray-800 dark:text-gray-200 font-medium'}`; 
                    textP.innerText = file.name;
                    
                    infoDiv.append(numSpan, textP);

                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'relative shrink-0 opacity-100 lg:opacity-0 group-hover/item:opacity-100 focus-within:opacity-100 transition flex items-center';
                    actionsDiv.innerHTML = `
                        <button onclick="event.stopPropagation(); document.querySelectorAll('.dropdown-content').forEach(d=>d.classList.remove('show')); document.getElementById('drop-m-${index}').classList.toggle('show');" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-white rounded-full menu-btn transition font-bold">⋮</button>
                        <div id="drop-m-${index}" class="dropdown-content absolute right-0 mt-8 w-28 bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-20 hidden">
                            <a onclick="renameItem('${file.id}', '${file.name.replace(/'/g,"\\'")}')" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer">Rename</a>
                            <a onclick="deleteItem('${file.id}', '${file.name.replace(/'/g,"\\'")}')" class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer">Delete</a>
                        </div>
                    `;
                    item.append(infoDiv, actionsDiv); container.appendChild(item);
                });

                if (!folders.length && !audios.length) container.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-sm text-gray-400"><div class="text-3xl mb-2 opacity-50">📁</div>Folder is empty.</div>';
            });
        }

        // Active UI Update
        function updateActiveTrackUI() {
            playlist.forEach((file, index) => {
                const isActive = index === currentIndex;
                const row = document.getElementById(`track_row_${index}`), icon = document.getElementById(`track_icon_${index}`), text = document.getElementById(`track_text_${index}`);
                if(!row || !icon || !text) return;
                if (isActive) {
                    row.className = `flex items-center justify-between p-3 sm:p-3.5 mb-1.5 group/item hover:bg-gray-50 dark:hover:bg-gray-800/50 transition cursor-pointer rounded-2xl bg-blue-50/80 dark:bg-blue-900/30 border border-blue-100 dark:border-blue-900/40 shadow-sm`;
                    icon.className = `w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center shrink-0 bg-white dark:bg-gray-800 text-[#0078d4] dark:text-blue-400 shadow-sm`;
                    icon.innerHTML = `<svg class="w-5 h-5 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>`;
                    text.className = `text-sm sm:text-[15px] leading-tight truncate text-[#0078d4] dark:text-blue-300 font-bold`;
                } else {
                    row.className = `flex items-center justify-between p-3 sm:p-3.5 mb-1.5 group/item hover:bg-gray-50 dark:hover:bg-gray-800/50 transition cursor-pointer rounded-2xl border border-transparent`;
                    icon.className = `w-10 h-10 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center shrink-0 text-gray-400 dark:text-gray-500 font-medium text-sm group-hover/item:text-gray-600 dark:group-hover/item:text-gray-300 bg-gray-100 dark:bg-gray-900 transition`;
                    icon.innerHTML = index + 1;
                    text.className = `text-sm sm:text-[15px] leading-tight truncate text-gray-800 dark:text-gray-200 font-medium`;
                }
            });
        }

        // Custom Player Controls
        const audio = document.getElementById('audio_player'), playPauseBtn = document.getElementById('play_pause_btn'), iconPlay = document.getElementById('icon_play'), iconPause = document.getElementById('icon_pause');
        const progressBar = document.getElementById('progress_bar'), currentTimeEl = document.getElementById('current_time'), durationTimeEl = document.getElementById('duration_time');

        function formatTime(sec) { if (isNaN(sec)) return "0:00"; const m = Math.floor(sec / 60), s = Math.floor(sec % 60); return `${m}:${s < 10 ? '0' : ''}${s}`; }

        audio.addEventListener('timeupdate', () => { if (!audio.duration) return; progressBar.value = (audio.currentTime / audio.duration) * 100; currentTimeEl.innerText = formatTime(audio.currentTime); });
        audio.addEventListener('loadedmetadata', () => { durationTimeEl.innerText = formatTime(audio.duration); progressBar.disabled = false; });
        progressBar.addEventListener('input', (e) => audio.currentTime = (e.target.value / 100) * audio.duration);

        function togglePlayPause() {
            if(playlist.length === 0) return;
            if (audio.paused) { if(!audio.src) playTrack(currentIndex); else audio.play(); } 
            else audio.pause();
        }

        audio.addEventListener('play', () => { iconPlay.classList.add('hidden'); iconPause.classList.remove('hidden'); setStatus('NOW PLAYING', 'play'); });
        audio.addEventListener('pause', () => { 
            iconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); 
            const currentStatus = document.getElementById('status_info').innerText;
            if(currentStatus !== 'BUFFERING...' && currentStatus !== 'ERROR') setStatus('PAUSED', 'standby'); 
        });

        function toggleRepeat() {
            playMode = (playMode + 1) % 4;
            const btn = document.getElementById('repeat_btn'), btnMobile = document.getElementById('repeat_btn_mobile');
            const activeClass = ['text-[#0078d4]', 'dark:text-blue-400', 'bg-blue-50', 'dark:bg-blue-900/20'];
            const inactiveClass = ['text-gray-400', 'hover:text-gray-900', 'dark:hover:text-white', 'hover:bg-gray-100', 'dark:hover:bg-gray-800'];
            [btn, btnMobile].forEach(el => {
                if(playMode > 0) { el.classList.remove(...inactiveClass); el.classList.add(...activeClass); }
                else { el.classList.remove(...activeClass); el.classList.add(...inactiveClass); }
            });
        }

        async function playTrack(index, autoPlay = true) {
            if (index < 0 || index >= playlist.length) return;
            audio.pause(); audio.removeAttribute('src'); 
            currentIndex = index; updateActiveTrackUI(); updateMarqueeText(playlist[index].name);
            setStatus('BUFFERING...', 'load'); progressBar.value = 0; currentTimeEl.innerText = "0:00"; progressBar.disabled = true;

            const playerCard = document.getElementById('player_card'); playerCard.classList.add('shimmer-active');

            fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${playlist[index].id}/content`, { headers: { Authorization: `Bearer ${await getToken()}` } })
            .then(res => res.blob()).then(blob => {
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = URL.createObjectURL(blob);
                audio.src = currentObjectUrl; playerCard.classList.remove('shimmer-active');
                if(autoPlay) audio.play(); else setStatus('READY', 'standby');
            }).catch(err => { playerCard.classList.remove('shimmer-active'); setStatus('ERROR', 'err'); });
        }

        function playNextTrack(isManual = false) {
            if (playMode === 2 && !isManual) playTrack(currentIndex);
            else if (playMode === 3) {
                let next = currentIndex; while (playlist.length > 1 && next === currentIndex) next = Math.floor(Math.random() * playlist.length);
                playTrack(next);
            } else if (currentIndex + 1 < playlist.length) playTrack(currentIndex + 1);
            else if (playMode === 1) playTrack(0);
            else { setStatus('FINISHED', 'standby'); iconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); }
        }
        function playPrevTrack() { if (audio.currentTime > 3) audio.currentTime = 0; else if (currentIndex > 0) playTrack(currentIndex - 1); }
        audio.addEventListener('ended', () => playNextTrack(false));

    </script>
</body>
</html>
