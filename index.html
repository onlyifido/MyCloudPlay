<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: '#1c4ed8', background: '#f9fafb', surface: '#ffffff', border: '#e5e7eb' }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .show { display: block !important; }
    </style>
</head>
<body class="bg-background text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- 상단 네비게이션 -->
    <header class="sticky top-0 z-50 bg-white border-b border-border shadow-sm">
        <div class="flex items-center justify-between px-4 sm:px-6 py-3 max-w-[1400px] mx-auto">
            <div class="font-bold text-xl tracking-tight flex items-center gap-2">
                <div class="w-6 h-6 bg-brand rounded-full"></div>
                DrivePlayer
            </div>
            
            <div class="flex items-center gap-3">
                <!-- 로그인 전 버튼 -->
                <button id="authorize_button" onclick="handleAuthClick()" class="bg-brand text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition shadow-sm">
                    구글 로그인
                </button>
                <!-- 로그인 후 로그아웃 버튼 -->
                <button id="signout_button" style="display: none;" onclick="handleSignoutClick()" class="text-red-500 bg-red-50 hover:bg-red-100 border border-red-100 px-4 py-2 rounded-lg text-sm font-semibold transition">
                    로그아웃
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="flex-1 max-w-[1400px] w-full mx-auto px-4 sm:px-6 py-8 flex flex-col lg:flex-row gap-6">
        
        <!-- 좌측 영역: 플레이어 + 내 폴더 목록 -->
        <div class="flex-1 flex flex-col gap-6">
            
            <!-- 플레이어 카드 -->
            <div class="border border-border rounded-xl p-6 bg-white shadow-sm flex flex-col gap-6 relative">
                <!-- 재생 모드 버튼 -->
                <div class="absolute top-4 right-4">
                    <button id="repeat_btn" onclick="toggleRepeat()" class="text-sm font-medium text-gray-500 hover:text-brand bg-gray-50 px-3 py-1.5 rounded-md border border-border transition">
                        모드: 끄기
                    </button>
                </div>

                <div class="flex items-start gap-4 mt-2">
                    <div class="w-16 h-16 bg-gray-100 rounded-xl flex items-center justify-center shrink-0 border border-border">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0 pr-20 lg:pr-0">
                        <div class="text-xs text-brand mb-1 font-semibold uppercase tracking-wider" id="status_info">대기 중</div>
                        <h1 id="file_info" class="text-2xl lg:text-3xl font-bold truncate">음악을 선택해주세요</h1>
                    </div>
                </div>

                <div class="mt-4">
                    <audio id="audio_player" controls class="w-full outline-none" style="display: none;"></audio>
                </div>
            </div>

            <!-- 앱 내부에 심어진 구글 드라이브 폴더 목록 -->
            <div id="folders_section" style="display: none;" class="flex flex-col gap-4">
                <div class="flex items-center gap-2">
                    <h2 class="text-lg font-bold">내 드라이브 폴더</h2>
                    <span class="text-xs text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full">최근 50개</span>
                </div>
<div id="folder_list" class="grid grid-cols-2 md:grid-cols-3 gap-3 max-h-[130px] md:max-h-[300px] overflow-y-auto no-scrollbar p-1">                    <!-- 폴더들이 여기에 렌더링됩니다 -->
                </div>
            </div>

        </div>

        <!-- 우측 영역: 플레이리스트 -->
        <div class="w-full lg:w-[400px] flex flex-col gap-4">
            <div class="flex items-center justify-between group">
                <h2 id="playlist_title" class="text-lg font-bold truncate pr-2">플레이리스트</h2>
                <span class="text-xs font-semibold text-gray-500 bg-gray-200 px-2 py-1 rounded-full shrink-0" id="playlist_count">0곡</span>
            </div>
            
            <div class="border border-border rounded-xl bg-white shadow-sm overflow-hidden flex flex-col h-[500px] lg:h-[650px]">
                <div id="playlist_container" class="overflow-y-auto no-scrollbar flex-1 divide-y divide-border/50">
                    <div class="p-6 text-center text-sm text-gray-500 font-medium mt-10 flex flex-col items-center gap-3">
                        <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        왼쪽에서 폴더를 선택해주세요.
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Google Identity Services (로그인 전용, 못생긴 Picker 라이브러리 삭제됨!) -->
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        const CLIENT_ID = '463416064121-o1ml3pjnp6bgu9tgb7cnbm2bou43u071.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive';

        let tokenClient;
        let accessToken = null;
        
        let playlist = [];
        let currentIndex = -1;
        let currentObjectUrl = null;
        let playMode = 0; 
        const modeLabels = ['모드: 끄기', '모드: 전곡 반복', '모드: 한곡 반복', '모드: 랜덤 재생'];

        // 1. 초기화 및 로컬 스토리지 확인 (업데이트됨)
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        handleLoginSuccess(tokenResponse.access_token, tokenResponse.expires_in);
                    }
                },
            });

            // 페이지 로드 시 저장된 토큰이 있는지, 만료되지는 않았는지 확인
            const savedToken = localStorage.getItem('drive_token');
            const expiresAt = localStorage.getItem('drive_token_expires');

            if (savedToken && expiresAt && Date.now() < parseInt(expiresAt)) {
                // 아직 만료되지 않았다면 자동 로그인 처리
                accessToken = savedToken;
                showMainUI();
                fetchMyFolders();
            }
        }

        // 로그인 성공 처리 및 저장 (업데이트됨)
        function handleLoginSuccess(token, expiresIn) {
            accessToken = token;
            
            // 토큰과 만료 시간(현재시간 + 유효초)을 로컬 스토리지에 저장
            const expireTime = Date.now() + (expiresIn * 1000);
            localStorage.setItem('drive_token', token);
            localStorage.setItem('drive_token_expires', expireTime);

            showMainUI();
            fetchMyFolders();
        }

        // UI 전환 함수 (새로 추가)
        function showMainUI() {
            document.getElementById('authorize_button').style.display = 'none';
            document.getElementById('signout_button').style.display = 'inline-block';
            document.getElementById('folders_section').style.display = 'flex';
        }

        function handleAuthClick() { tokenClient.requestAccessToken({prompt: 'consent'}); }

        // 로그아웃 시 저장소 비우기 (업데이트됨)
        function handleSignoutClick() {
            if (accessToken) {
                google.accounts.oauth2.revoke(accessToken, () => {
                    // 저장된 토큰 정보 삭제
                    localStorage.removeItem('drive_token');
                    localStorage.removeItem('drive_token_expires');
                    accessToken = null;
                    location.reload(); 
                });
            } else {
                localStorage.removeItem('drive_token');
                localStorage.removeItem('drive_token_expires');
                location.reload(); 
            }
        }

        function fetchMyFolders() {
            const container = document.getElementById('folder_list');
            container.innerHTML = '<div class="col-span-2 md:col-span-3 text-sm text-gray-500 py-4">폴더를 불러오는 중입니다...</div>';
            
            const query = encodeURIComponent(`mimeType = 'application/vnd.google-apps.folder' and trashed = false`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id,name)&orderBy=name&pageSize=50`;

            fetch(url, { method: 'GET', headers: { 'Authorization': 'Bearer ' + accessToken } })
            .then(res => {
                // 토큰이 만료되어 거절당한 경우(401 에러) 처리
                if (res.status === 401) {
                    throw new Error('TOKEN_EXPIRED');
                }
                return res.json();
            })
            .then(data => {
                container.innerHTML = '';
                if (data.files && data.files.length > 0) {
                    data.files.forEach(folder => {
                        const btn = document.createElement('button');
                        btn.className = 'flex items-center gap-3 p-3 border border-border rounded-xl hover:border-brand hover:bg-blue-50 transition cursor-pointer bg-white shadow-sm text-left';
                        btn.innerHTML = `
                            <svg class="w-6 h-6 text-brand shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                            <span class="text-sm font-semibold truncate text-gray-700">${folder.name}</span>
                        `;
                        btn.onclick = () => fetchFolderContents(folder.id, folder.name);
                        container.appendChild(btn);
                    });
                } else {
                    container.innerHTML = '<div class="col-span-2 text-sm text-gray-500">드라이브에 폴더가 없습니다.</div>';
                }
            })
            .catch(err => {
                if (err.message === 'TOKEN_EXPIRED') {
                    alert('세션이 만료되었습니다. 다시 로그인해주세요.');
                    handleSignoutClick(); // 저장소 비우고 새로고침
                } else {
                    container.innerHTML = '<div class="col-span-2 text-sm text-red-500">폴더를 불러오지 못했습니다.</div>';
                }
            });
        }

        function fetchFolderContents(folderId, folderName) {
            document.getElementById('status_info').innerText = '음악 검색 중...';
            document.getElementById('playlist_title').innerText = folderName; 
            
            const query = encodeURIComponent(`'${folderId}' in parents and mimeType contains 'audio/' and trashed = false`);
            const url = `https://www.googleapis.com/drive/v3/files?q=${query}&fields=files(id,name)&orderBy=name`;

            fetch(url, { method: 'GET', headers: { 'Authorization': 'Bearer ' + accessToken } })
            .then(res => {
                if (res.status === 401) throw new Error('TOKEN_EXPIRED');
                return res.json();
            })
            .then(data => {
                if (data.files && data.files.length > 0) {
                    playlist = data.files;
                    currentIndex = 0;
                    updatePlaylistUI();
                    playTrack(0);
                } else {
                    alert(`'${folderName}' 폴더 안에는 오디오 파일이 없습니다.`);
                    document.getElementById('status_info').innerText = '대기 중';
                }
            })
            .catch(err => {
                if (err.message === 'TOKEN_EXPIRED') {
                    alert('세션이 만료되었습니다. 다시 로그인해주세요.');
                    handleSignoutClick();
                }
            });
        }

        function toggleRepeat() {
            playMode = (playMode + 1) % 4;
            const btn = document.getElementById('repeat_btn');
            btn.innerText = modeLabels[playMode];
            if(playMode > 0) {
                btn.classList.add('text-brand', 'border-brand', 'bg-blue-50');
                btn.classList.remove('text-gray-500', 'border-border', 'bg-gray-50');
            } else {
                btn.classList.remove('text-brand', 'border-brand', 'bg-blue-50');
                btn.classList.add('text-gray-500', 'border-border', 'bg-gray-50');
            }
        }

        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            updatePlaylistUI(); 
            
            const file = playlist[index];
            document.getElementById('file_info').innerText = file.name;
            document.getElementById('status_info').innerText = '스트리밍 준비 중...';
            const audioPlayer = document.getElementById('audio_player');
            audioPlayer.style.display = 'block';

            fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + accessToken }
            })
            .then(response => {
                if (response.status === 401) throw new Error('TOKEN_EXPIRED');
                if (!response.ok) throw new Error('다운로드 실패');
                return response.blob();
            })
            .then(blob => {
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = URL.createObjectURL(blob);
                document.getElementById('status_info').innerText = '현재 재생 중';
                audioPlayer.src = currentObjectUrl;
                audioPlayer.play();
            })
            .catch(error => {
                if (error.message === 'TOKEN_EXPIRED') {
                    alert('세션이 만료되었습니다. 다시 로그인해주세요.');
                    audioPlayer.pause();
                    handleSignoutClick();
                } else {
                    document.getElementById('status_info').innerText = '재생 오류';
                    document.getElementById('status_info').classList.add('text-red-500');
                    setTimeout(() => {
                        document.getElementById('status_info').classList.remove('text-red-500');
                        playNextTrack();
                    }, 2000); 
                }
            });
        }

        function playNextTrack() {
            if (playMode === 2) {
                playTrack(currentIndex);
            } else if (playMode === 3) {
                if (playlist.length > 1) {
                    let nextIndex = currentIndex;
                    while (nextIndex === currentIndex) nextIndex = Math.floor(Math.random() * playlist.length);
                    playTrack(nextIndex);
                } else {
                     playTrack(currentIndex);
                }
            } else if (currentIndex + 1 < playlist.length) {
                playTrack(currentIndex + 1);
            } else if (playMode === 1) {
                playTrack(0);
            } else {
                document.getElementById('status_info').innerText = '재생 목록 완료';
            }
        }

        document.getElementById('audio_player').addEventListener('ended', playNextTrack);

        function updatePlaylistUI() {
            const container = document.getElementById('playlist_container');
            document.getElementById('playlist_count').innerText = `${playlist.length}곡`;
            container.innerHTML = '';
            
            playlist.forEach((file, index) => {
                const isActive = index === currentIndex;
                
                const item = document.createElement('div');
                item.className = `p-3 flex justify-between items-center group/item hover:bg-gray-50 transition cursor-pointer relative ${isActive ? 'bg-blue-50/50 border-l-4 border-brand' : 'border-l-4 border-transparent'}`;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'flex items-center gap-3 flex-1 min-w-0 pr-4';
                infoDiv.onclick = () => playTrack(index);
                
                const numSpan = document.createElement('span');
                numSpan.className = `text-xs font-bold w-4 text-center ${isActive ? 'text-brand' : 'text-gray-400'}`;
                numSpan.innerText = isActive ? '▶' : (index + 1);
                
                const nameP = document.createElement('p');
                nameP.className = `text-sm font-medium truncate ${isActive ? 'text-brand font-bold' : 'text-gray-700'}`;
                nameP.innerText = file.name;
                
                infoDiv.appendChild(numSpan);
                infoDiv.appendChild(nameP);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'relative shrink-0';
                
                const menuBtn = document.createElement('button');
                menuBtn.className = 'w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-700 rounded menu-btn transition font-bold';
                menuBtn.innerHTML = '⋮';
                menuBtn.onclick = (e) => toggleDropdown(e, index);
                
                const dropdown = document.createElement('div');
                dropdown.id = `dropdown-${index}`;
                dropdown.className = 'dropdown-content absolute right-0 mt-1 w-32 bg-white rounded-lg shadow-lg border border-border py-1 z-10 hidden';
                
                const renameLink = document.createElement('a');
                renameLink.className = 'block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900 cursor-pointer transition';
                renameLink.innerText = '이름 변경';
                renameLink.onclick = () => { renameFile(index); closeAllDropdowns(); };
                
                const trashLink = document.createElement('a');
                trashLink.className = 'block px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer transition';
                trashLink.innerText = '삭제 (휴지통)';
                trashLink.onclick = () => { trashFile(index); closeAllDropdowns(); };
                
                dropdown.appendChild(renameLink);
                dropdown.appendChild(trashLink);
                
                actionsDiv.appendChild(menuBtn);
                actionsDiv.appendChild(dropdown);
                
                item.appendChild(infoDiv);
                item.appendChild(actionsDiv);
                
                container.appendChild(item);
            });
        }

        function toggleDropdown(event, index) {
            event.stopPropagation(); 
            closeAllDropdowns(); 
            document.getElementById(`dropdown-${index}`).classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) closeAllDropdowns();
        }

        function closeAllDropdowns() {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
        }

        function renameFile(index) {
            const file = playlist[index];
            const newName = prompt('새 파일 이름을 입력하세요:', file.name);
            
            if (newName && newName !== file.name) {
                fetch(`https://www.googleapis.com/drive/v3/files/${file.id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                }).then(res => {
                    if (res.status === 401) throw new Error('TOKEN_EXPIRED');
                    return res.json();
                }).then(data => {
                    playlist[index].name = data.name;
                    updatePlaylistUI(); 
                    if(index === currentIndex) document.getElementById('file_info').innerText = data.name;
                }).catch(err => {
                    if (err.message === 'TOKEN_EXPIRED') {
                        alert('세션이 만료되었습니다. 다시 로그인해주세요.');
                        handleSignoutClick();
                    }
                });
            }
        }

        function trashFile(index) {
            const file = playlist[index];
            if (confirm(`'${file.name}'을(를) 휴지통으로 버리시겠습니까?`)) {
                fetch(`https://www.googleapis.com/drive/v3/files/${file.id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trashed: true })
                }).then(res => {
                    if (res.status === 401) throw new Error('TOKEN_EXPIRED');
                    
                    playlist.splice(index, 1);
                    if (index === currentIndex) {
                        if (playlist.length > 0) {
                            if (currentIndex >= playlist.length) currentIndex = 0;
                            playTrack(currentIndex); 
                        } else {
                            document.getElementById('audio_player').pause();
                            document.getElementById('file_info').innerText = '목록이 비었습니다.';
                            document.getElementById('status_info').innerText = '대기 중';
                            currentIndex = -1;
                        }
                    } else if (index < currentIndex) {
                        currentIndex--;
                    }
                    updatePlaylistUI();
                }).catch(err => {
                    if (err.message === 'TOKEN_EXPIRED') {
                        alert('세션이 만료되었습니다. 다시 로그인해주세요.');
                        handleSignoutClick();
                    }
                });
            }
        }
    </script>
</body>
</html>
