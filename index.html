<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneDrive Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: '#0078d4', background: '#f9fafb', surface: '#ffffff', border: '#e5e7eb' }
                }
            }
        }
    </script>
    <!-- Microsoft Authentication Library (MSAL) -->
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .show { display: block !important; }
    </style>
</head>
<body class="bg-background text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- 상단 네비게이션 -->
    <header class="sticky top-0 z-50 bg-white border-b border-border shadow-sm">
        <div class="flex items-center justify-between px-4 sm:px-6 py-3 max-w-[1400px] mx-auto">
            <div class="font-bold text-xl tracking-tight flex items-center gap-2">
                <!-- OneDrive 톤업 블루 로고 -->
                <div class="w-6 h-6 bg-[#0078d4] rounded-[4px] flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
                </div>
                OneDrive Player
            </div>
            
            <div class="flex items-center gap-3">
                <button id="login_button" onclick="signIn()" class="bg-[#0078d4] text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition shadow-sm">
                    Microsoft 로그인
                </button>
                <button id="logout_button" style="display: none;" onclick="signOut()" class="text-red-500 bg-red-50 hover:bg-red-100 border border-red-100 px-4 py-2 rounded-lg text-sm font-semibold transition">
                    로그아웃
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="flex-1 max-w-[1400px] w-full mx-auto px-4 sm:px-6 py-8 flex flex-col lg:flex-row gap-6">
        
        <!-- 좌측 영역: 플레이어 + 내 폴더 목록 -->
        <div class="flex-1 flex flex-col gap-6">
            
            <!-- 플레이어 카드 -->
            <div class="border border-border rounded-xl p-6 bg-white shadow-sm flex flex-col gap-6 relative">
                <!-- 재생 모드 버튼 -->
                <div class="absolute top-4 right-4">
                    <button id="repeat_btn" onclick="toggleRepeat()" class="text-sm font-medium text-gray-500 hover:text-brand bg-gray-50 px-3 py-1.5 rounded-md border border-border transition">
                        모드: 끄기
                    </button>
                </div>

                <div class="flex items-start gap-4 mt-2">
                    <div class="w-16 h-16 bg-blue-50 rounded-xl flex items-center justify-center shrink-0 border border-blue-100">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0 pr-20 lg:pr-0">
                        <div class="text-xs text-brand mb-1 font-semibold uppercase tracking-wider" id="status_info">대기 중</div>
                        <h1 id="file_info" class="text-2xl lg:text-3xl font-bold truncate">음악을 선택해주세요</h1>
                    </div>
                </div>

                <div class="mt-4">
                    <audio id="audio_player" controls class="w-full outline-none" style="display: none;"></audio>
                </div>
            </div>

            <!-- OneDrive 폴더 목록 -->
            <div id="folders_section" style="display: none;" class="flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <h2 class="text-lg font-bold">OneDrive 폴더</h2>
                        <span class="text-xs text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full">루트 경로</span>
                    </div>
                    <!-- 상위 폴더로 이동 버튼 -->
                    <button id="back_btn" onclick="fetchMyFolders('root')" style="display: none;" class="text-sm text-brand font-semibold hover:underline">
                        ← 처음으로
                    </button>
                </div>
                <div id="folder_list" class="grid grid-cols-2 md:grid-cols-3 gap-3 max-h-[130px] md:max-h-[300px] overflow-y-auto no-scrollbar p-1">
                    <!-- 폴더 렌더링 영역 -->
                </div>
            </div>

        </div>

        <!-- 우측 영역: 플레이리스트 -->
        <div class="w-full lg:w-[400px] flex flex-col gap-4">
            <div class="flex items-center justify-between group">
                <h2 id="playlist_title" class="text-lg font-bold truncate pr-2">플레이리스트</h2>
                <span class="text-xs font-semibold text-gray-500 bg-gray-200 px-2 py-1 rounded-full shrink-0" id="playlist_count">0곡</span>
            </div>
            
            <div class="border border-border rounded-xl bg-white shadow-sm overflow-hidden flex flex-col h-[500px] lg:h-[650px]">
                <div id="playlist_container" class="overflow-y-auto no-scrollbar flex-1 divide-y divide-border/50">
                    <div class="p-6 text-center text-sm text-gray-500 font-medium mt-10 flex flex-col items-center gap-3">
                        <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        왼쪽에서 폴더를 선택해주세요.
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // ==========================================
        // [필독] 아래 CLIENT_ID를 본인의 값으로 변경하세요!
        // ==========================================
        const msalConfig = {
            auth: {
                clientId: "여기에_Azure_클라이언트ID_입력", 
                authority: "https://login.microsoftonline.com/common",
                redirectUri: "http://localhost:5500", // 본인의 Live Server 주소 (또는 호스팅 주소)
            },
            cache: {
                cacheLocation: "sessionStorage", // 세션 유지 설정
                storeAuthStateInCookie: false,
            }
        };

        const loginRequest = {
            scopes: ["Files.ReadWrite.All"] // 파일 읽기/쓰기/삭제 권한
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        
        let accountId = "";
        let playlist = [];
        let currentIndex = -1;
        let currentObjectUrl = null;
        let playMode = 0; 
        const modeLabels = ['모드: 끄기', '모드: 전곡 반복', '모드: 한곡 반복', '모드: 랜덤 재생'];

        // 페이지 로드 시 로그인 상태 확인
        msalInstance.handleRedirectPromise().then(handleResponse).catch(err => { console.error(err); });

        function handleResponse(response) {
            if (response !== null) {
                accountId = response.account.homeAccountId;
                showMainUI();
                fetchMyFolders('root'); // 초기에는 루트 폴더 불러오기
            } else {
                const currentAccounts = msalInstance.getAllAccounts();
                if (currentAccounts.length > 0) {
                    accountId = currentAccounts[0].homeAccountId;
                    showMainUI();
                    fetchMyFolders('root');
                }
            }
        }

        function signIn() {
            msalInstance.loginPopup(loginRequest).then(handleResponse).catch(error => { console.error(error); });
        }

        function signOut() {
            const logoutRequest = { account: msalInstance.getAccountByHomeId(accountId) };
            msalInstance.logoutPopup(logoutRequest).then(() => {
                location.reload();
            });
        }

        function showMainUI() {
            document.getElementById('login_button').style.display = 'none';
            document.getElementById('logout_button').style.display = 'inline-block';
            document.getElementById('folders_section').style.display = 'flex';
        }

        // 토큰 발급 래퍼 함수 (MSAL이 만료 관리를 자동 처리)
        async function getToken() {
            const request = { scopes: ["Files.ReadWrite.All"], account: msalInstance.getAccountByHomeId(accountId) };
            try {
                const response = await msalInstance.acquireTokenSilent(request);
                return response.accessToken;
            } catch (error) {
                console.warn("Silent token acquisition failed. Acquiring token using popup");
                if (error instanceof msal.InteractionRequiredAuthError) {
                    const response = await msalInstance.acquireTokenPopup(request);
                    return response.accessToken;
                }
            }
        }

        // 1. OneDrive 특정 경로의 폴더와 오디오 파일 가져오기
        async function fetchMyFolders(folderId) {
            const container = document.getElementById('folder_list');
            container.innerHTML = '<div class="col-span-2 md:col-span-3 text-sm text-gray-500 py-4">불러오는 중...</div>';
            
            const token = await getToken();
            const endpoint = folderId === 'root' 
                ? "https://graph.microsoft.com/v1.0/me/drive/root/children?$select=id,name,folder,file"
                : `https://graph.microsoft.com/v1.0/me/drive/items/${folderId}/children?$select=id,name,folder,file`;

            fetch(endpoint, { headers: { Authorization: `Bearer ${token}` } })
            .then(res => res.json())
            .then(data => {
                container.innerHTML = '';
                
                // 루트가 아니면 뒤로가기 버튼 표시
                document.getElementById('back_btn').style.display = folderId === 'root' ? 'none' : 'block';

                const folders = data.value.filter(item => item.folder);
                const audios = data.value.filter(item => item.file && item.file.mimeType && item.file.mimeType.includes('audio'));

                // 폴더 먼저 렌더링
                folders.forEach(folder => {
                    const btn = document.createElement('button');
                    btn.className = 'flex items-center gap-3 p-3 border border-border rounded-xl hover:border-brand hover:bg-blue-50 transition cursor-pointer bg-white shadow-sm text-left';
                    btn.innerHTML = `
                        <svg class="w-6 h-6 text-[#0078d4] shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                        <span class="text-sm font-semibold truncate text-gray-700">${folder.name}</span>
                    `;
                    // 폴더 클릭 시 해당 폴더 진입 (탐색)
                    btn.onclick = () => {
                        fetchMyFolders(folder.id);
                        document.getElementById('playlist_title').innerText = folder.name;
                    };
                    container.appendChild(btn);
                });

                // 같은 경로 내에 오디오 파일이 있으면 플레이리스트에 즉시 추가
                if (audios.length > 0) {
                    playlist = audios;
                    currentIndex = 0;
                    updatePlaylistUI();
                    playTrack(0);
                } else if (folders.length === 0) {
                    container.innerHTML = '<div class="col-span-2 text-sm text-gray-500">빈 폴더입니다.</div>';
                }
            })
            .catch(err => {
                console.error(err);
                container.innerHTML = '<div class="col-span-2 text-sm text-red-500">데이터를 불러오지 못했습니다.</div>';
            });
        }

        function toggleRepeat() {
            playMode = (playMode + 1) % 4;
            const btn = document.getElementById('repeat_btn');
            btn.innerText = modeLabels[playMode];
            if(playMode > 0) {
                btn.classList.add('text-brand', 'border-brand', 'bg-blue-50');
                btn.classList.remove('text-gray-500', 'border-border', 'bg-gray-50');
            } else {
                btn.classList.remove('text-brand', 'border-brand', 'bg-blue-50');
                btn.classList.add('text-gray-500', 'border-border', 'bg-gray-50');
            }
        }

        async function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            updatePlaylistUI(); 
            
            const file = playlist[index];
            document.getElementById('file_info').innerText = file.name;
            document.getElementById('status_info').innerText = '스트리밍 준비 중...';
            const audioPlayer = document.getElementById('audio_player');
            audioPlayer.style.display = 'block';

            const token = await getToken();
            
            // Microsoft Graph API는 파일 다운로드를 위해 '@microsoft.graph.downloadUrl' 속성이나 '/content' 엔드포인트를 사용합니다.
            fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${file.id}/content`, {
                headers: { Authorization: `Bearer ${token}` }
            })
            .then(response => {
                if (!response.ok) throw new Error('다운로드 실패');
                return response.blob();
            })
            .then(blob => {
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = URL.createObjectURL(blob);
                document.getElementById('status_info').innerText = '현재 재생 중';
                audioPlayer.src = currentObjectUrl;
                audioPlayer.play();
            })
            .catch(error => {
                console.error(error);
                document.getElementById('status_info').innerText = '재생 오류';
                document.getElementById('status_info').classList.add('text-red-500');
                setTimeout(() => {
                    document.getElementById('status_info').classList.remove('text-red-500');
                    playNextTrack();
                }, 2000); 
            });
        }

        function playNextTrack() {
            if (playMode === 2) {
                playTrack(currentIndex);
            } else if (playMode === 3) {
                if (playlist.length > 1) {
                    let nextIndex = currentIndex;
                    while (nextIndex === currentIndex) nextIndex = Math.floor(Math.random() * playlist.length);
                    playTrack(nextIndex);
                } else {
                     playTrack(currentIndex);
                }
            } else if (currentIndex + 1 < playlist.length) {
                playTrack(currentIndex + 1);
            } else if (playMode === 1) {
                playTrack(0);
            } else {
                document.getElementById('status_info').innerText = '재생 목록 완료';
            }
        }

        document.getElementById('audio_player').addEventListener('ended', playNextTrack);

        function updatePlaylistUI() {
            const container = document.getElementById('playlist_container');
            document.getElementById('playlist_count').innerText = `${playlist.length}곡`;
            container.innerHTML = '';
            
            playlist.forEach((file, index) => {
                const isActive = index === currentIndex;
                
                const item = document.createElement('div');
                item.className = `p-3 flex justify-between items-center group/item hover:bg-gray-50 transition cursor-pointer relative ${isActive ? 'bg-blue-50/50 border-l-4 border-brand' : 'border-l-4 border-transparent'}`;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'flex items-center gap-3 flex-1 min-w-0 pr-4';
                infoDiv.onclick = () => playTrack(index);
                
                const numSpan = document.createElement('span');
                numSpan.className = `text-xs font-bold w-4 text-center ${isActive ? 'text-brand' : 'text-gray-400'}`;
                numSpan.innerText = isActive ? '▶' : (index + 1);
                
                const nameP = document.createElement('p');
                nameP.className = `text-sm font-medium truncate ${isActive ? 'text-brand font-bold' : 'text-gray-700'}`;
                nameP.innerText = file.name;
                
                infoDiv.appendChild(numSpan);
                infoDiv.appendChild(nameP);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'relative shrink-0';
                
                const menuBtn = document.createElement('button');
                menuBtn.className = 'w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-700 rounded menu-btn transition font-bold';
                menuBtn.innerHTML = '⋮';
                menuBtn.onclick = (e) => toggleDropdown(e, index);
                
                const dropdown = document.createElement('div');
                dropdown.id = `dropdown-${index}`;
                dropdown.className = 'dropdown-content absolute right-0 mt-1 w-32 bg-white rounded-lg shadow-lg border border-border py-1 z-10 hidden';
                
                const renameLink = document.createElement('a');
                renameLink.className = 'block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900 cursor-pointer transition';
                renameLink.innerText = '이름 변경';
                renameLink.onclick = () => { renameFile(index); closeAllDropdowns(); };
                
                const trashLink = document.createElement('a');
                trashLink.className = 'block px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer transition';
                trashLink.innerText = '삭제';
                trashLink.onclick = () => { trashFile(index); closeAllDropdowns(); };
                
                dropdown.appendChild(renameLink);
                dropdown.appendChild(trashLink);
                
                actionsDiv.appendChild(menuBtn);
                actionsDiv.appendChild(dropdown);
                
                item.appendChild(infoDiv);
                item.appendChild(actionsDiv);
                
                container.appendChild(item);
            });
        }

        function toggleDropdown(event, index) {
            event.stopPropagation(); 
            closeAllDropdowns(); 
            document.getElementById(`dropdown-${index}`).classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) closeAllDropdowns();
        }

        function closeAllDropdowns() {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
        }

        async function renameFile(index) {
            const file = playlist[index];
            const newName = prompt('새 파일 이름을 입력하세요:', file.name);
            
            if (newName && newName !== file.name) {
                const token = await getToken();
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${file.id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                }).then(res => res.json()).then(data => {
                    playlist[index].name = data.name;
                    updatePlaylistUI(); 
                    if(index === currentIndex) document.getElementById('file_info').innerText = data.name;
                });
            }
        }

        async function trashFile(index) {
            const file = playlist[index];
            if (confirm(`'${file.name}'을(를) 삭제하시겠습니까?`)) {
                const token = await getToken();
                fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${file.id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => {
                    if (res.ok || res.status === 204) {
                        playlist.splice(index, 1);
                        if (index === currentIndex) {
                            if (playlist.length > 0) {
                                if (currentIndex >= playlist.length) currentIndex = 0;
                                playTrack(currentIndex); 
                            } else {
                                document.getElementById('audio_player').pause();
                                document.getElementById('file_info').innerText = '목록이 비었습니다.';
                                document.getElementById('status_info').innerText = '대기 중';
                                currentIndex = -1;
                            }
                        } else if (index < currentIndex) {
                            currentIndex--;
                        }
                        updatePlaylistUI();
                    } else {
                        alert("파일 삭제에 실패했습니다.");
                    }
                });
            }
        }
    </script>
</body>
</html>
